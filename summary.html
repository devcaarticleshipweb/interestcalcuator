<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260630-1">
</head>
<body class="entry-body">
  <main class="app-shell">
    <aside class="sidebar" aria-label="Main menu">
      <div class="sidebar-brand">
        <p class="eyebrow">Workspace</p>
        <h2>Loan Desk</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item">Home</a>
        <a href="summary.html" class="nav-item is-active">Summary</a>
        <a href="entry.html" class="nav-item">Add Loan</a>
        <a href="data.html" class="nav-item">Data</a>
        <a href="change-password.html" class="nav-item">Change Password</a>
        <button type="button" class="nav-item nav-button mobile-logout" data-logout>Logout</button>
      </nav>

      <div class="sidebar-userbar">
        <p class="sidebar-username" id="sidebarUsername">User</p>
        <button type="button" class="logout-btn sidebar-logout" id="logoutButton" data-logout>Log out</button>
      </div>
    </aside>

    <section class="entry-shell">
      <section class="entry-header">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Summary</h1>
          <p class="entry-copy">Review loan type totals and filter them month by month.</p>
        </div>
        <div class="data-toolbar">
          <label class="summary-filter">
            <select id="monthFilter"></select>
          </label>
          <button type="button" class="secondary-btn" id="refreshButton">Refresh</button>
        </div>
      </section>

      <section class="entry-panel">
        <p class="form-note" id="summaryNote" aria-live="polite">Loading summary...</p>
        <div class="summary-totalbar" id="summaryTotalBar"></div>
        <div class="summary-grid" id="summaryGrid"></div>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="permissions.js?v=20260630-3"></script>
  <script src="summary.js"></script>
</body>
</html>
