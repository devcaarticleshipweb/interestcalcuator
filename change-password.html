<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="entry-body">
  <main class="app-shell">
    <aside class="sidebar" aria-label="Main menu">
      <div class="sidebar-brand">
        <p class="eyebrow">Workspace</p>
        <h2>Loan Desk</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item">Home</a>
        <a href="summary.html" class="nav-item">Summary</a>
        <a href="entry.html" class="nav-item">Add Loan</a>
        <a href="data.html" class="nav-item">Data</a>
        <a href="change-password.html" class="nav-item is-active">Change Password</a>
        <button type="button" class="nav-item nav-button mobile-logout" data-logout>Logout</button>
      </nav>

      <div class="sidebar-userbar">
        <p class="sidebar-username" id="sidebarUsername">User</p>
        <button type="button" class="logout-btn sidebar-logout" id="logoutButton" data-logout>Log out</button>
      </div>
    </aside>

    <section class="entry-shell">
      <section class="entry-header">
        <div>
          <p class="eyebrow">Account</p>
          <h1>Change Password</h1>
        </div>
      </section>

      <section class="entry-panel" aria-label="Change password form">
        <form class="entry-form" id="changePasswordForm">
          <label class="field">
            <span>Old Password <span class="required-mark">*</span></span>
            <input type="password" id="oldPasswordField" autocomplete="current-password" required>
          </label>

          <label class="field">
            <span>New Password <span class="required-mark">*</span></span>
            <input type="password" id="newPasswordField" autocomplete="new-password" required>
          </label>

          <label class="field">
            <span>Confirm Password <span class="required-mark">*</span></span>
            <input type="password" id="confirmPasswordField" autocomplete="new-password" required>
          </label>

          <div class="entry-actions field-wide">
            <button type="submit" class="submit-btn" id="changePasswordButton">Update Password</button>
            <p class="form-note" id="changePasswordNote" aria-live="polite">Enter your old password and choose a new one.</p>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="permissions.js?v=20260512-1"></script>
  <script src="change-password.js"></script>
</body>
</html>
