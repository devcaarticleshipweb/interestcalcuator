<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260627-1">
</head>
<body class="entry-body">
  <main class="app-shell">
    <aside class="sidebar" aria-label="Main menu">
      <div class="sidebar-brand">
        <p class="eyebrow">Workspace</p>
        <h2>Loan Desk</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item is-active">Home</a>
        <a href="summary.html" class="nav-item">Summary</a>
        <a href="entry.html" class="nav-item">Add Loan</a>
        <a href="data.html" class="nav-item">Data</a>
        <a href="change-password.html" class="nav-item">Change Password</a>
        <button type="button" class="nav-item nav-button mobile-logout" data-logout>Logout</button>
      </nav>

      <div class="sidebar-userbar">
        <p class="sidebar-username" id="sidebarUsername">User</p>
        <button type="button" class="logout-btn sidebar-logout" id="logoutButton" data-logout>Log out</button>
      </div>
    </aside>

    <section class="entry-shell">
      <section class="home-hero">
        <p class="eyebrow">Welcome</p>
        <h1 id="welcomeTitle">Welcome User</h1>
      </section>

      <section class="entry-panel">
        <div class="data-filters">
          <label class="field">
            <span>Name</span>
            <select id="borrowerFilterField">
              <option value="">Loading names...</option>
            </select>
          </label>

          <label class="field">
            <span>Date</span>
            <input type="date" id="interestDateField">
          </label>
        </div>

        <p class="form-note" id="homeNote" aria-live="polite">Loading saved loan records...</p>
        <div class="table-shell">
          <table class="data-table" id="homeTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Amount</th>
                <th>Interest</th>
                <th>Margin %</th>
                <th>Deposit Date</th>
                <th>Articles</th>
                <th>View</th>
              </tr>
            </thead>
            <tbody id="homeTableBody"></tbody>
          </table>
        </div>
        <div class="home-card-list" id="homeCardList"></div>
      </section>
    </section>
  </main>

  <div class="modal-backdrop hidden" id="viewModalBackdrop">
    <section class="modal-card modal-card-wide" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
      <div class="modal-top">
        <div>
          <p class="eyebrow">Loan details</p>
          <h2 id="viewModalTitle">Entry Details</h2>
        </div>
        <button type="button" class="modal-close" id="closeViewModal" aria-label="Close">x</button>
      </div>
      <div class="detail-grid" id="detailGrid"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="permissions.js?v=20260512-1"></script>
  <script src="home.js?v=20260627-1"></script>
</body>
</html>
